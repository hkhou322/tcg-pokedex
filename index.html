<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TCG Pokédex</title>
  <meta name="poketcg-api-key" content="" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <span class="ball" aria-hidden="true"></span>
      <h1>TCG Pokédex</h1>
    </div>
    <p class="tagline">Search &amp; browse every Pokémon Trading Card Game card</p>
  </header>

  <section class="toolbar" aria-label="Search and filters">
    <input
      type="search"
      id="search"
      class="search"
      placeholder="Search by name (e.g. Pikachu)…"
      autocomplete="off"
      aria-label="Search cards by name"
    />
    <label class="field">
      <span>Type</span>
      <select id="type-filter" aria-label="Filter by type">
        <option value="">All types</option>
      </select>
    </label>
    <label class="field">
      <span>Set</span>
      <select id="set-filter" aria-label="Filter by set">
        <option value="">All sets</option>
      </select>
    </label>
    <span id="result-count" class="result-count" role="status" aria-live="polite"></span>
  </section>

  <main id="card-grid" class="card-grid" aria-live="polite"></main>

  <div class="more-wrap">
    <button id="load-more" class="load-more" type="button" hidden>Load more</button>
  </div>

  <div id="card-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" type="button" aria-label="Close" data-close="1">×</button>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p>Data from the <a href="https://pokemontcg.io" target="_blank" rel="noopener">Pokémon TCG API</a>. Not affiliated with The Pokémon Company.</p>
  </footer>

  <script src="app.js?v=search-race-fix-20260713"></script>
</body>
</html>
